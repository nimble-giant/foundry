apiVersion: v1
kind: foundry-index
name: nimble-foundry
description: "Official Ailloy foundry index by Nimble Giant"
author:
  name: Nimble Giant
  url: https://github.com/nimble-giant
molds:
  - name: nimble-mold
    source: github.com/nimble-giant/nimble-mold
    description: "Distributable, reusable, and agnostic AI instruction blanks for common SDLC workflows"
    tags: ["ailloy-mold", "workflows", "claude", "sdlc"]

  - name: plugin-to-mold
    source: github.com/kriscoleman/plugin-to-mold
    description: "Conversion toolkit: skills and agent that automate converting Claude Code plugins to multi-target ailloy molds"
    tags: ["ailloy-mold", "conversion", "claude", "opencode", "toolkit", "foundry"]

  - name: ghostwriter
    source: github.com/nimble-giant/foundry//molds/ghostwriter
    description: "Interactively interviews the user to capture their personal writing voice and emits a ready-to-install SKILL.md that teaches other AI agents to write in that voice"
    tags: ["ailloy-mold", "writing", "voice", "style", "skills", "productivity"]
